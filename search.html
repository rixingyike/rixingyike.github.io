<script>
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('search-query');
    const searchBtn = document.getElementById('search-btn');
    const searchResults = document.getElementById('page-search-results');
    const resultsContainer = document.getElementById('page-results-container');
    const resultsCount = document.getElementById('results-count');
    const noResults = document.getElementById('no-results');
    const clearBtn = document.getElementById('clear-search');
    const defaultContent = document.getElementById('default-content');
    
    // 搜索数据 - 动态加载 search.json
    let searchData = [];
    async function loadSearchIndex() {
        try {
            const res = await fetch('/search.json', { cache: 'no-store' });
            if (!res.ok) return [];
            const data = await res.json();
            const items = Array.isArray(data) ? data : (data.items || []);
            return items.map(item => ({
                title: item.title || item.slug || '',
                content: item.content || item.summary || '',
                url: item.url || '',
                date: item.date || item.date_ymd || '',
                tags: item.tags || [],
                categories: item.categories || []
            }));
        } catch (e) {
            console.error('加载搜索索引失败:', e);
            return [];
        }
    }
    
    // 执行搜索
    function performSearch(query) {
        if (!query || !query.trim()) {
            clearSearch();
            return;
        }

        const q = query.toLowerCase();
        const results = searchData.filter(post => {
            const searchText = (
                (post.title || '') + ' ' +
                (post.content || '') + ' ' +
                (Array.isArray(post.tags) ? post.tags.join(' ') : '') + ' ' +
                (Array.isArray(post.categories) ? post.categories.join(' ') : '')
            ).toLowerCase();
            return searchText.includes(q);
        });

        displayResults(results, query);
    }
    
    // 显示搜索结果
    function displayResults(results, query) {
        defaultContent.classList.add('hidden');
        searchResults.classList.remove('hidden');

        if (results.length === 0) {
            resultsContainer.classList.add('hidden');
            noResults.classList.remove('hidden');
            resultsCount.textContent = '(0 篇)';
            return;
        }

        resultsContainer.classList.remove('hidden');
        noResults.classList.add('hidden');
        resultsCount.textContent = `(${results.length} 篇)`;

        const html = results.map(result => {
            const title = highlightText(result.title, query);
            const excerpt = highlightText(result.content.substring(0, 200), query);
            
            return `
                <article class="card hover: transition- duration-300">
                    <div class="card-body">
                        <h3 class="text-xl font-semibold mb-2">
                            <a href="${result.url}" class="text-moss-ink hover:text-cyber-mint transition-colors">
                                ${title}
                            </a>
                        </h3>
                        <div class="text-mist-green mb-3 leading-relaxed">
                            ${excerpt}${result.content.length > 200 ? '...' : ''}
                        </div>
                        <div class="flex items-center justify-between text-sm text-mist-green">
                            <div class="flex items-center space-x-4">
                                ${result.date ? `<span>${result.date}</span>` : ''}
                                ${result.categories.length > 0 ? `<span>${result.categories.join(' / ')}</span>` : ''}
                            </div>
                            <div class="flex flex-wrap gap-1">
                                ${result.tags.map(tag => `
                                    <span class="px-2 py-1 bg-primary-100 text-primary-800  text-xs">
                                        ${tag}
                                    </span>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </article>
            `;
        }).join('');
        
        resultsContainer.innerHTML = html;
    }
    
    // 高亮搜索关键词
    function highlightText(text, query) {
        if (!query) return text;
        const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(${safe})`, 'gi');
        return text.replace(regex, '<mark class="bg-yellow-200 px-1">$1</mark>');
    }
    
    // 清除搜索
    function clearSearch() {
        searchInput.value = '';
        searchResults.classList.add('hidden');
        defaultContent.classList.remove('hidden');
        searchInput.focus();
    }
    
    // 事件监听
    searchBtn.addEventListener('click', () => {
        performSearch(searchInput.value);
    });

    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            performSearch(searchInput.value);
        }
    });

    clearBtn.addEventListener('click', clearSearch);

    // 热门搜索词点击
    document.querySelectorAll('.search-keyword').forEach(btn => {
        btn.addEventListener('click', () => {
            const keyword = btn.getAttribute('data-keyword') || '';
            searchInput.value = keyword;
            performSearch(keyword);
        });
    });
    
    // 加载索引后处理初始搜索参数
    loadSearchIndex().then(items => {
        searchData = items;
        const urlParams = new URLSearchParams(window.location.search);
        const queryParam = urlParams.get('q');
        if (queryParam) {
            searchInput.value = queryParam;
            performSearch(queryParam);
        }
    });
});
</script>

    <!-- 搜索下拉面板：快捷导航 + 搜索结果 -->
    <script>
    var _searchData = [];
    async function _loadSearchIndex() {
        try {
            var res = await fetch('/search.json', { cache: 'no-store' });
            if (!res.ok) return;
            var data = await res.json();
            var items = Array.isArray(data) ? data : (data.items || []);
            _searchData = items.map(function(item) {
                return {
                    title: item.title || item.slug || '',
                    content: item.content || item.summary || '',
                    url: item.url || '',
                    date: item.date || item.date_ymd || ''
                };
            });
        } catch (e) {
            console.error('加载搜索索引失败:', e);
        }
    }
    _loadSearchIndex();

    $(document).ready(function() {
        var $input = $('#nav-search-input');
        var $dropdown = $('#search-dropdown');
        var $shortcuts = $('#search-shortcuts');
        var $suggestions = $('#search-suggestions');

        function renderDropdown(query) {
            if (!query) {
                $dropdown.addClass('hidden');
                return;
            }

            var q = query.toLowerCase();

            // Part 1: 导航快捷链接
            var shortcutsHtml = '';
            var sData = getShortcuts(query);
            if (sData.length > 0) {
                shortcutsHtml = '<div class="px-3 py-1.5 text-xs text-mist-green font-semibold">快速导航</div>';
                sData.forEach(function(s) {
                    shortcutsHtml += '<a href="' + s.url + '" class="flex items-center px-4 py-2 text-sm hover:bg-air-bg transition-colors text-moss-ink">' + s.label + '</a>';
                });
            }

            // Part 2: 文章搜索结果
            var resultsHtml = '';
            if (_searchData.length > 0) {
                var results = _searchData.filter(function(p) {
                    var searchText = (p.title + ' ' + p.content).toLowerCase();
                    return searchText.includes(q);
                });
                if (results.length > 0) {
                    var sectionLabel = sData.length > 0 ? '文章' : '搜索结果';
                    resultsHtml = '<div class="px-3 py-1.5 text-xs text-mist-green font-semibold">' + sectionLabel + '</div>';
                    results.slice(0, 5).forEach(function(r) {
                        resultsHtml += '<a href="' + r.url + '" class="flex items-center px-4 py-2 text-sm hover:bg-air-bg transition-colors text-mist-green">' +
                            '<svg class="w-3.5 h-3.5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>' +
                            _highlight(r.title, q) + '</a>';
                    });
                }
            }

            if (shortcutsHtml || resultsHtml) {
                if (shortcutsHtml && resultsHtml) {
                    $shortcuts.html(shortcutsHtml).removeClass('hidden');
                    $suggestions.html(resultsHtml).removeClass('hidden');
                } else if (shortcutsHtml) {
                    $shortcuts.html(shortcutsHtml).removeClass('hidden');
                    $suggestions.addClass('hidden');
                } else {
                    $shortcuts.addClass('hidden');
                    $suggestions.html(resultsHtml).removeClass('hidden');
                }
                $dropdown.removeClass('hidden');
            } else {
                $dropdown.addClass('hidden');
            }
        }

        function _highlight(text, query) {
            if (!query || !text) return text || '';
            var safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            var re = new RegExp('(' + safe + ')', 'gi');
            return text.replace(re, '<mark class="bg-yellow-200 px-0.5">$1</mark>');
        }

        $input.on('input', function() {
            renderDropdown($(this).val().trim());
        });

        var _selectedIdx = -1;

        function _selectItem(idx) {
            var items = $dropdown.find('a');
            items.removeClass('bg-air-bg');
            if (idx >= 0 && idx < items.length) {
                items.eq(idx).addClass('bg-air-bg');
                _selectedIdx = idx;
            } else {
                _selectedIdx = -1;
            }
        }

        $input.on('keydown', function(e) {
            if (e.key === 'Escape') {
                $dropdown.addClass('hidden');
                $input.blur();
                return;
            }
            if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                e.preventDefault();
                var items = $dropdown.find('a');
                if (items.length === 0) return;
                if (e.key === 'ArrowDown') {
                    _selectItem(_selectedIdx < items.length - 1 ? _selectedIdx + 1 : 0);
                } else {
                    _selectItem(_selectedIdx > 0 ? _selectedIdx - 1 : items.length - 1);
                }
                return;
            }
            if (e.key === 'Enter') {
                if (_selectedIdx >= 0) {
                    var items = $dropdown.find('a');
                    var $target = items.eq(_selectedIdx);
                    if ($target.length && $target.attr('href')) {
                        window.location.href = $target.attr('href');
                        e.preventDefault();
                    }
                }
                return;
            }
            // 输入变化时重置选中
            _selectedIdx = -1;
        });

        $(document).on('click', function(e) {
            if (!$(e.target).closest('#search-widget').length) {
                $dropdown.addClass('hidden');
            }
        });
    });

    function getShortcuts(query) {
        if (!query || !query.trim()) return [];
        var q = query.trim().toLowerCase();
        var map = {
            '作者': '/about.html', '关于': '/about.html',
            '项目': '/projects/',
            '专栏': '/columns/', '系列': '/columns/',
            '博客': '/archives/', '归档': '/archives/', '文章': '/archives/',
            '友链': '/friends/', '友情链接': '/friends/',
            '分类': '/categories/', '标签': '/tags/',
            '作品': '/works/', '出版': '/works/', '图书': '/works/', '书': '/works/', '著作': '/works/',
            '闲言': '/tweets/', '碎语': '/tweets/',
            '搜索': '/search.html',
            '首页': '/',
            'home': '/', 'about': '/about.html', 'projects': '/projects/',
            'columns': '/columns/', 'works': '/works/', 'archives': '/archives/',
            'friends': '/friends/', 'tags': '/tags/',
            'categories': '/categories/'
        };
        var exact = [];
        var fuzzy = [];
        for (var key in map) {
            if (key.indexOf(q) !== -1 || q.indexOf(key) !== -1) {
                var entry = { label: '→ ' + key + ' (' + map[key] + ')', url: map[key] };
                if (key === q) {
                    exact.push(entry);
                } else {
                    fuzzy.push(entry);
                }
            }
        }
        var results = exact.concat(fuzzy);
        if (results.length > 0) return results.slice(0, 5);
        var yearMatch = q.match(/^(\d{4})$/);
        if (yearMatch) {
            return [{ label: '→ ' + yearMatch[1] + ' 年归档 /archives/' + yearMatch[1] + '.html', url: '/archives/' + yearMatch[1] + '.html' }];
        }
        return [];
    }
    </script>

                return false;

            document.addEventListener('submit', function(e) {
                var input = e.target.querySelector('input[name="q"]') || e.target.querySelector('input[type="text"]');
                if (input && checkRedirect(input.value)) {
                    e.preventDefault();
                }
            });
        })();

    <script>
    function rpBookmark() {
        if (navigator.share && window.innerWidth <= 768) {
            navigator.share({
                title: document.title,
                url: window.location.href
            }).catch(function() {});
        } else {
            var isMac = navigator.platform && navigator.platform.indexOf('Mac') !== -1;
            var hint = isMac ? '\u2318+D' : 'Ctrl+D';
            if (window.showToast) {
                window.showToast('\u6309\u4E0B ' + hint + ' \u5373\u53EF\u6536\u85CF\u672C\u9875');
            } else {

    <script>
    var RP_REPO = 'rixingyike/yishulun.com_discus';

    function rpBatchLoadListingCounts() {
        if (!RP_REPO) return;
        var articles = document.querySelectorAll('article');
        if (!articles.length) return;

        fetch('https://api.github.com/search/issues?q=' + encodeURIComponent('repo:' + RP_REPO + ' is:issue') + '&per_page=100&sort=created&order=desc', {
            headers: {
                'Accept': 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28'
            }
        })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (!data.items || !data.items.length) return;
                var issues = {};
                data.items.forEach(function (issue) {
                    var m = issue.body && issue.body.match(/Comment thread for (\S+)/);
                    if (m) {
                        var pathKey = decodeURIComponent(m[1]);
                        if (issues[pathKey] && issues[pathKey].number > issue.number) {
                            return;
                        }
                        issues[pathKey] = issue;
                        issues[m[1]] = issue;
                    }
                });

                articles.forEach(function (article) {
                    var href = article.getAttribute('data-url');
                    if (!href) {
                        var link = article.querySelector('h2 a') || article.querySelector('a');
                        href = link ? link.getAttribute('href') : null;
                    }
                    if (!href) return;
                    
                    var decodedHref = decodeURIComponent(href);
                    var issue = issues[decodedHref] || issues[href];
                    if (!issue) return;

                    var spans = article.querySelectorAll('button span.font-medium');
                    if (spans.length >= 2) {
                        spans[0].textContent = issue.comments || 0;
                        spans[1].textContent = (issue.reactions && issue.reactions['+1']) || 0;
                    }
                });
            })
            .catch(function () {});
    }

    setTimeout(function () {
        if (RP_REPO) rpBatchLoadListingCounts();
    }, 500);
    </script>

    <!-- 全局极简直角 Toast 提示 -->
    <script>
        window.showToast = function(message) {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.style.position = 'fixed';
                container.style.top = '24px';
                container.style.left = '50%';
                container.style.transform = 'translateX(-50%)';
                container.style.zIndex = '99999';
                container.style.display = 'flex';
                container.style.flexDirection = 'column';
                container.style.gap = '12px';
                container.style.pointerEvents = 'none';
                document.body.appendChild(container);
            }
            
            const toast = document.createElement('div');
            // Moss Ink 经典极简深色背景，搭配 Cyber Mint 高亮绿字与微弱绿边，完全直角且无阴影
            toast.style.backgroundColor = '#182422';
            toast.style.color = '#00f6af';
            toast.style.border = '1px solid rgba(0, 246, 175, 0.25)';
            toast.style.padding = '12px 24px';
            toast.style.fontSize = '14px';
            toast.style.fontWeight = '500';
            toast.style.letterSpacing = '0.05em';
            toast.style.minWidth = '280px';
            toast.style.textAlign = 'center';
            toast.style.boxSizing = 'border-box';
            
            // 动画初状态与 transition 设定
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(-8px)';
            toast.style.transition = 'opacity 0.3s ease-out, transform 0.3s ease-out';
            toast.style.pointerEvents = 'auto';
            
            toast.textContent = message;
            container.appendChild(toast);
            
            // 下一帧淡入
            setTimeout(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateY(0)';
            }, 10);
            
            // 3秒后自动淡出销毁
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-8px)';
                setTimeout(() => {
                    toast.remove();
                    if (container.children.length === 0) {
                        container.remove();
                    }
                }, 300);
            }, 3000);
        };
    </script>
